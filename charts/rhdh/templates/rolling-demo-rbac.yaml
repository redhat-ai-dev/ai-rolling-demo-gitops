apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-reader-binding{{ if .Values.global.isSecondaryInstance }}-{{ .Release.Namespace }}{{ end }}
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: k8s-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sidecars-job-deployment-patcher
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sidecars-job-deployment-patcher{{ if .Values.global.isSecondaryInstance }}-{{ .Release.Namespace }}{{ end }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sidecars-job-deployment-patcher
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
