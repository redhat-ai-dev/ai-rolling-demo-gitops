name: Nightly UI Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ui-tests:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run tests
        working-directory: tests
        env:
          RHDH_BASE_URL: ${{ secrets.RHDH_BASE_URL }}
          RHDH_ENVIRONMENT: ${{ secrets.RHDH_ENVIRONMENT }}
          ROLLING_DEMO_TEST_USERNAME: ${{ secrets.ROLLING_DEMO_TEST_USERNAME }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: npx playwright test

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data-binary '{
              "text": "*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|[FIRING] NightlyRollingDemoTestsFailed>*",
              "attachments": [
                {
                  "color": "#FF0000",
                  "fields": [
                    {
                      "title": "Summary",
                      "value": "Nightly UI tests failed on the `main` branch.",
                      "short": false
                    },
                    {
                      "title": "Description",
                      "value": "One or more tests failed.",
                      "short": false
                    },
                    {
                      "title": "Severity",
                      "value": "critical",
                      "short": true
                    }
                  ]
                }
              ]
            }'
